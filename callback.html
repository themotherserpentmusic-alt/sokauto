<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Callback</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        h1 { color: #000; }
    </style>
</head>
<body>
    <h1>TikTok Authorization Callback</h1>
    <p>This page receives the authorization code from TikTok.</p>
    <p><strong>Status:</strong> Callback received successfully.</p>
    <p>You can close this tab.</p>
    
    <script>
        // Optional: Show the URL parameters for debugging
        const params = new URLSearchParams(window.location.search);
        if (params.has('code')) {
            document.write('<p style="color:green;">Authorization code received: ' + params.get('code').substring(0, 20) + '...</p>');
        }
    </script>
</body>
</html>
