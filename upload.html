<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to TikTok - SOK Auto</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 480px;
      width: 100%;
    }
    h1 { text-align: center; color: #000; margin-bottom: 10px; }
    .account {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: center;
    }
    .upload-area {
      border: 3px dashed #0066cc;
      border-radius: 12px;
      padding: 40px 20px;
      margin: 25px 0;
      cursor: pointer;
    }
    button {
      background: #000;
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 17px;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    #file-name { margin: 15px 0; font-weight: bold; color: #0066cc; }
    .success { color: #28a745; font-weight: bold; margin-top: 20px; display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1>SOK Auto</h1>
  <p style="text-align:center;">Upload Video to TikTok</p>

  <!-- Fake Connected Account -->
  <div class="account">
    <p><strong>Connected as:</strong> @testcreator123</p>
    <p style="font-size:0.9em; color:#28a745;">✓ TikTok Account Connected</p>
  </div>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <p>Click to select MP4 video</p>
    <input type="file" id="fileInput" accept="video/mp4" style="display:none;" onchange="showFileName(this)">
  </div>

  <div id="file-name"></div>

  <button onclick="startFakeUpload()">Upload to TikTok</button>

  <div id="status" class="success"></div>
</div>

<script>
  function showFileName(input) {
    if (input.files.length > 0) {
      document.getElementById('file-name').textContent = "Selected: " + input.files[0].name;
    }
  }

  function startFakeUpload() {
    const status = document.getElementById('status');
    const button = document.querySelector('button');
    
    button.disabled = true;
    button.textContent = "Uploading to TikTok...";

    status.style.display = "block";
    status.textContent = "Sending video to your TikTok account...";

    setTimeout(() => {
      status.textContent = "✅ Video successfully uploaded to Drafts!";
      button.textContent = "Upload Complete";
    }, 2400);
  }
</script>

</body>
</html>
