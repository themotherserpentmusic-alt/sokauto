<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOK Auto - Upload to TikTok</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #000;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 30px;
    }
    .upload-area {
      border: 2px dashed #0066cc;
      border-radius: 10px;
      padding: 40px 20px;
      margin: 20px 0;
      cursor: pointer;
    }
    button {
      background: #000;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #333;
    }
    #file-name {
      margin-top: 15px;
      font-weight: bold;
      color: #0066cc;
      min-height: 20px;
    }
    .success {
      color: #28a745;
      font-weight: bold;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>SOK Auto</h1>
  <p>Upload video to TikTok</p>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <p>Click to select MP4 video</p>
    <input type="file" id="fileInput" accept="video/mp4" style="display:none;" onchange="showFileName(this)">
  </div>

  <div id="file-name"></div>

  <button onclick="startFakeUpload()">Upload to TikTok</button>

  <div id="status" class="success"></div>
</div>

<script>
  function showFileName(input) {
    if (input.files.length > 0) {
      document.getElementById('file-name').textContent = "Selected: " + input.files[0].name;
    }
  }

  function startFakeUpload() {
    const status = document.getElementById('status');
    const button = document.querySelector('button');
    
    button.disabled = true;
    button.textContent = "Uploading...";
    
    status.style.display = "block";
    status.textContent = "Uploading to TikTok...";

    // Simulate upload progress
    setTimeout(() => {
      status.textContent = "✅ Upload Successful! Video sent to TikTok Drafts.";
      button.textContent = "Done";
    }, 2200);
  }
</script>

</body>
</html>
