<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to TikTok - SOK Auto</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #000; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #0066cc;
      border-radius: 12px;
      padding: 50px 20px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      background: #f8fbff;
    }
    button {
      background: #000;
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 17px;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }
    button:hover { background: #333; }
    #file-name {
      margin: 15px 0;
      font-weight: bold;
      color: #0066cc;
      min-height: 24px;
    }
    .success {
      color: #28a745;
      font-weight: bold;
      margin-top: 25px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>SOK Auto</h1>
  <p>Upload your video to TikTok</p>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <p>Click here to select an MP4 video</p>
    <input type="file" id="fileInput" accept="video/mp4" style="display:none;" onchange="showFileName(this)">
  </div>

  <div id="file-name"></div>

  <button onclick="startFakeUpload()">Upload to TikTok</button>

  <div id="status" class="success"></div>
</div>

<script>
  function showFileName(input) {
    if (input.files.length > 0) {
      document.getElementById('file-name').textContent = "Selected: " + input.files[0].name;
    }
  }

  function startFakeUpload() {
    const status = document.getElementById('status');
    const button = document.querySelector('button');
    
    button.disabled = true;
    button.textContent = "Uploading to TikTok...";
    
    status.style.display = "block";
    status.textContent = "Processing and sending video...";

    setTimeout(() => {
      status.textContent = "✅ Video successfully uploaded to your TikTok Drafts!";
      button.textContent = "Upload Complete";
    }, 2500);
  }
</script>

</body>
</html>
